services:
  server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: locrun-server
    env_file:
      - .env
    environment:
      - FORCE_HTTPS=${FORCE_HTTPS:-true}
      - ACME_CA=${ACME_CA:-https://acme-v02.api.letsencrypt.org/directory}
    ports:
      - "${HTTPS_PORT:-443}:443"
      - "${HTTP_PORT:-80}:80"
      - "${SSH_PORT:-222}:22"
    volumes:
      - ssh_keys:/home/tun/.ssh/
      - ssh_host_keys:/etc/ssh/
    restart: unless-stopped

volumes:
  ssh_keys:
  ssh_host_keys:
