services:
  server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: locrun-server
    env_file:
      - .env
    ports:
      - "${HTTPS_PORT:-443}:443"
      - "${SSH_PORT:-22}:22"
    volumes:
      - ssh_keys:/home/tun/.ssh/
      - ssh_host_keys:/etc/ssh/
    restart: unless-stopped

volumes:
  ssh_keys:
  ssh_host_keys:
